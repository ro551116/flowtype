<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流程表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #08080d;
  --bg-base: #0e0e16;
  --bg-surface: #151520;
  --bg-elevated: #1c1c2a;
  --accent: #e8a030;
  --accent-dim: rgba(232,160,48,0.08);
  --text-primary: #e4e4ec;
  --text-secondary: #8888a0;
  --text-muted: #50506a;
  --border: rgba(255,255,255,0.06);
  --border-light: rgba(255,255,255,0.1);
  --font-ui: 'Sora', -apple-system, 'Microsoft JhengHei', sans-serif;
  --font-mono: 'Space Mono', 'SF Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-ui); background: var(--bg-deep); color: var(--text-primary); }
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none; z-index: 0;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

.view-header {
  background: var(--bg-base);
  border-bottom: 1px solid var(--border);
  color: #fff; padding: 24px 32px; text-align: center;
  position: relative;
}
.view-header::after {
  content: '';
  position: absolute; bottom: -1px; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.6;
}
.view-header h1 {
  font-size: 22px; font-weight: 700; margin-bottom: 10px;
  letter-spacing: 1px;
}
.view-header .meta {
  font-size: 11px; color: var(--text-secondary);
  font-family: var(--font-mono);
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
}

/* Role filter bar */
.role-bar {
  background: var(--bg-base); padding: 12px 32px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.role-bar label {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 500;
  cursor: pointer; padding: 5px 14px; border-radius: 16px;
  transition: all 0.2s; user-select: none;
}
.role-bar label:hover { filter: brightness(1.2); }
.role-bar input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--accent); }

/* Table */
.view-container { max-width: 1600px; margin: 0 auto; padding: 0; position: relative; z-index: 1; }
.flow-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px; background: var(--bg-surface);
}
.flow-table th {
  padding: 10px 12px; text-align: left;
  font-weight: 600; font-size: 11px;
  border-bottom: 2px solid var(--border-light);
  white-space: nowrap;
  position: sticky; top: 44px; z-index: 50;
  background: var(--bg-elevated);
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-secondary);
}
.flow-table td {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  vertical-align: top; line-height: 1.6;
}
.flow-table tr { transition: background 0.15s; }
.flow-table tr:hover { background: var(--accent-dim); }

/* Section row */
.section-row { background: var(--bg-elevated) !important; }
.section-row td {
  font-weight: 700; font-size: 13px; color: var(--accent);
  padding: 10px 16px; border-bottom: 2px solid rgba(232,160,48,0.2);
  border-left: 3px solid var(--accent);
}

/* Column sizing */
.col-num { width: 36px; text-align: center; color: var(--text-muted); font-size: 11px; font-family: var(--font-mono); }
.col-time { width: 70px; white-space: nowrap; font-weight: 500; font-family: var(--font-mono); font-size: 12px; }
.col-dur { width: 50px; text-align: center; color: var(--text-secondary); font-family: var(--font-mono); font-size: 12px; }
.col-item { min-width: 160px; font-weight: 500; }
.col-note { min-width: 100px; }

/* Note cell */
.note-cell { white-space: pre-wrap; font-size: 12px; }
.note-cell:not(:empty) {
  background: rgba(255,255,255,0.03); border-radius: 4px; padding: 4px 8px;
}

/* Role colors */
.rc-0 { color: #60a5fa; } .rh-0 { background: rgba(96,165,250,0.15); color: #60a5fa; }
.rc-1 { color: #fb923c; } .rh-1 { background: rgba(251,146,60,0.15); color: #fb923c; }
.rc-2 { color: #4ade80; } .rh-2 { background: rgba(74,222,128,0.15); color: #4ade80; }
.rc-3 { color: #c084fc; } .rh-3 { background: rgba(192,132,252,0.15); color: #c084fc; }
.rc-4 { color: #f87171; } .rh-4 { background: rgba(248,113,113,0.15); color: #f87171; }
.rc-5 { color: #22d3ee; } .rh-5 { background: rgba(34,211,238,0.15); color: #22d3ee; }
.rc-6 { color: #facc15; } .rh-6 { background: rgba(250,204,21,0.15); color: #facc15; }
.rc-7 { color: #f472b6; } .rh-7 { background: rgba(244,114,182,0.15); color: #f472b6; }

/* Loading */
.loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: 14px; }

/* Print */
@media print {
  body, body::before { background: #fff; }
  .view-header { background: #1a1a2e; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .role-bar { display: none; }
  .flow-table { background: #fff; }
  .flow-table th { position: static; background: #f0f0f0; color: #333; }
  .flow-table td { color: #333; border-color: #ddd; }
  .section-row { background: #e8eaf0 !important; }
  .section-row td { color: #1a1a2e; }
  .note-cell { color: #555; }
}

/* Mobile */
@media (max-width: 768px) {
  .view-header { padding: 16px; }
  .view-header h1 { font-size: 18px; }
  .flow-table { font-size: 11px; }
  .flow-table th, .flow-table td { padding: 6px 8px; }
}
</style>
</head>
<body>

<div class="view-header" id="header">
  <h1 id="title">載入中...</h1>
  <div class="meta" id="meta"></div>
</div>
<div class="role-bar" id="roleBar"></div>
<div class="view-container">
  <table class="flow-table" id="flowTable">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const ROLE_COLORS = 8;
let data = null;
let visibleRoles = new Set();

function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

async function load() {
  const id = location.pathname.split('/').pop();
  const res = await fetch('/api/events/' + id);
  if (!res.ok) { document.getElementById('title').textContent = '找不到此活動'; return; }
  lastJson = await res.text();
  data = JSON.parse(lastJson);

  // Header
  document.title = (data.event.name || '流程表') + ' — 線上預覽';
  document.getElementById('title').textContent = data.event.name || '活動流程表';
  const meta = [];
  if (data.event.date) meta.push('日期：' + data.event.date);
  if (data.event.venue) meta.push('場地：' + esc(data.event.venue));
  if (data.event.organizer) meta.push('主辦：' + esc(data.event.organizer));
  if (data.event.contact) meta.push('聯絡人：' + esc(data.event.contact));
  if (data.event.phone) meta.push('電話：' + data.event.phone);
  document.getElementById('meta').innerHTML = meta.map(m => '<span>' + m + '</span>').join('');

  // Role filter
  visibleRoles = new Set(data.roles);
  renderRoleBar();
  renderTable();
}

function renderRoleBar() {
  const bar = document.getElementById('roleBar');
  bar.innerHTML = '';
  data.roles.forEach((role, i) => {
    const ci = i % ROLE_COLORS;
    const lbl = document.createElement('label');
    lbl.className = 'rh-' + ci;
    lbl.innerHTML = `<input type="checkbox" checked data-role="${esc(role)}" onchange="toggleRole(this)"> ${esc(role)}`;
    bar.appendChild(lbl);
  });
}

function toggleRole(cb) {
  const role = cb.dataset.role;
  if (cb.checked) visibleRoles.add(role); else visibleRoles.delete(role);
  renderTable();
}

function renderTable() {
  const roles = data.roles.filter(r => visibleRoles.has(r));

  // Header
  let hhtml = '<tr><th class="col-num">#</th><th class="col-time">時間</th><th class="col-dur">時長</th><th class="col-item">項目</th>';
  roles.forEach((role, ri) => {
    const ci = data.roles.indexOf(role) % ROLE_COLORS;
    hhtml += `<th class="col-note rc-${ci}">${esc(role)}</th>`;
  });
  hhtml += '</tr>';
  document.getElementById('thead').innerHTML = hhtml;

  // Body
  let bhtml = '';
  let num = 1;
  const colspan = 4 + roles.length;

  data.rows.forEach(row => {
    if (row.isSection) {
      bhtml += `<tr class="section-row"><td colspan="${colspan}">${esc(row.sectionLabel)}</td></tr>`;
      return;
    }

    // Skip completely empty rows
    const hasContent = row.item || row.time || roles.some(r => row.notes && row.notes[r]);
    if (!hasContent) return;

    bhtml += '<tr>';
    bhtml += `<td class="col-num">${num++}</td>`;
    bhtml += `<td class="col-time">${esc(row.time)}</td>`;
    bhtml += `<td class="col-dur">${row.duration ? row.duration + 'm' : ''}</td>`;
    bhtml += `<td class="col-item">${esc(row.item).replace(/\n/g, '<br>')}</td>`;
    roles.forEach(role => {
      const ci = data.roles.indexOf(role) % ROLE_COLORS;
      const val = (row.notes && row.notes[role]) || '';
      bhtml += `<td><div class="note-cell rc-${ci}">${esc(val).replace(/\n/g, '<br>')}</div></td>`;
    });
    bhtml += '</tr>';
  });

  document.getElementById('tbody').innerHTML = bhtml;
}

load();

// Auto-refresh: poll every 3s for changes
let lastJson = '';
const eventId = location.pathname.split('/').pop();

setInterval(async () => {
  try {
    const res = await fetch('/api/events/' + eventId);
    if (!res.ok) return;
    const text = await res.text();
    if (text === lastJson) return;
    lastJson = text;
    data = JSON.parse(text);
    // Keep user's filter: remove deleted roles, auto-show new roles
    const oldVisible = new Set(visibleRoles);
    visibleRoles = new Set(data.roles.filter(r => oldVisible.has(r)));
    data.roles.forEach(r => { if (!oldVisible.has(r)) visibleRoles.add(r); });
    document.getElementById('title').textContent = data.event.name || '活動流程表';
    renderRoleBar();
    document.querySelectorAll('#roleBar input[type=checkbox]').forEach(cb => {
      cb.checked = visibleRoles.has(cb.dataset.role);
    });
    renderTable();
  } catch {}
}, 3000);
</script>
</body>
</html>
