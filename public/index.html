<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動流程表</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f0f2f5; color: #333; }

.header {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: #fff;
  padding: 20px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 { font-size: 22px; font-weight: 600; cursor: pointer; }
.header-actions { display: flex; gap: 10px; align-items: center; }

.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* ===== Event List Page ===== */
.event-list-page { display: block; }
.event-editor-page { display: none; }

.list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.list-header h2 { font-size: 20px; color: #1a1a2e; }

.event-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.event-card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.event-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-2px); }
.event-card h3 { font-size: 16px; margin-bottom: 8px; color: #1a1a2e; }
.event-card .meta { font-size: 13px; color: #888; display: flex; flex-direction: column; gap: 4px; }
.event-card .card-actions {
  position: absolute;
  top: 16px;
  right: 16px;
  display: flex;
  gap: 6px;
}
.event-card .card-actions button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  opacity: 0.3;
  transition: opacity 0.2s;
  padding: 4px;
}
.event-card .card-actions button:hover { opacity: 1; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #aaa;
}
.empty-state p { font-size: 16px; margin-bottom: 16px; }

/* ===== Editor Page ===== */
.event-info {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.event-info h2 { font-size: 16px; margin-bottom: 16px; color: #1a1a2e; }
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.info-grid label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
.info-grid input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  transition: border-color 0.2s;
}
.info-grid input:focus { outline: none; border-color: #4a6cf7; }

.roles-section {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.roles-section h2 { font-size: 16px; margin-bottom: 16px; color: #1a1a2e; }
.roles-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.role-tag {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
}
.role-tag .remove-role {
  cursor: pointer; font-size: 16px; line-height: 1; opacity: 0.6; transition: opacity 0.2s;
}
.role-tag .remove-role:hover { opacity: 1; }
.add-role-row { display: flex; gap: 8px; }
.add-role-row input {
  padding: 6px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; width: 160px;
}
.add-role-row input:focus { outline: none; border-color: #4a6cf7; }

.cue-section {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.cue-section h2 { font-size: 16px; margin-bottom: 16px; color: #1a1a2e; }
.cue-table-wrapper { overflow-x: auto; }
table.cue-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
.cue-table th {
  background: #f7f8fc; padding: 10px 12px; text-align: left;
  font-weight: 600; color: #555; border-bottom: 2px solid #e8e8e8; white-space: nowrap;
}
.cue-table td { padding: 6px 8px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
.cue-table tr:hover { background: #fafbff; }
.cue-table input, .cue-table textarea {
  width: 100%; border: 1px solid transparent; background: transparent;
  padding: 6px 8px; border-radius: 6px; font-size: 13px; font-family: inherit;
  resize: vertical; transition: border-color 0.2s, background 0.2s;
}
.cue-table input:focus, .cue-table textarea:focus { outline: none; border-color: #4a6cf7; background: #fff; }
.cue-table input:hover, .cue-table textarea:hover { background: #f7f8fc; }
.cue-table textarea { min-height: 36px; }
td.row-actions { white-space: nowrap; text-align: center; }
.row-actions button {
  background: none; border: none; cursor: pointer; font-size: 16px;
  padding: 4px; opacity: 0.4; transition: opacity 0.2s;
}
.row-actions button:hover { opacity: 1; }

/* Drag handle */
.drag-handle {
  cursor: grab; opacity: 0.3; font-size: 14px; user-select: none; padding: 2px 4px;
  transition: opacity 0.2s;
}
.drag-handle:hover { opacity: 0.8; }
.drag-handle:active { cursor: grabbing; }
tr.dragging { opacity: 0.4; background: #e3f2fd !important; }
tr.drag-over td { border-top: 2px solid #4a6cf7 !important; }

/* Insert row button */
.insert-btn {
  background: none; border: none; cursor: pointer; font-size: 14px;
  opacity: 0.3; transition: opacity 0.2s; padding: 2px 4px; color: #2ed573;
}
.insert-btn:hover { opacity: 1; }

.col-num { width: 40px; text-align: center; }
.col-time { width: 90px; }
.col-duration { width: 70px; }
.col-item { width: 180px; }
.col-note { min-width: 120px; }
.col-actions { width: 70px; }

.btn {
  padding: 8px 18px; border: none; border-radius: 8px; font-size: 13px;
  font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.btn-primary { background: #4a6cf7; color: #fff; }
.btn-primary:hover { background: #3b5de7; }
.btn-secondary { background: #e8ecf4; color: #333; }
.btn-secondary:hover { background: #dde1ea; }
.btn-success { background: #2ed573; color: #fff; }
.btn-success:hover { background: #26c066; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.add-row-btn { margin-top: 12px; display: flex; gap: 8px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 1000; justify-content: center; align-items: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #fff; border-radius: 16px; padding: 32px; width: 420px;
  max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal h3 { font-size: 18px; margin-bottom: 20px; color: #1a1a2e; }
.modal-roles { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.modal-roles label {
  display: flex; align-items: center; gap: 10px; font-size: 14px;
  cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: background 0.2s;
}
.modal-roles label:hover { background: #f7f8fc; }
.modal-roles input[type="checkbox"] { width: 18px; height: 18px; accent-color: #4a6cf7; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

.role-color-0 { background: #e3f2fd; color: #1565c0; }
.role-color-1 { background: #fff3e0; color: #e65100; }
.role-color-2 { background: #e8f5e9; color: #2e7d32; }
.role-color-3 { background: #f3e5f5; color: #7b1fa2; }
.role-color-4 { background: #fce4ec; color: #c62828; }
.role-color-5 { background: #e0f7fa; color: #00838f; }
.role-color-6 { background: #fff8e1; color: #f57f17; }
.role-color-7 { background: #efebe9; color: #4e342e; }

.save-indicator { font-size: 12px; color: #aaa; transition: color 0.3s; }
.save-indicator.saved { color: #2ed573; }
</style>
</head>
<body>

<div class="header">
  <h1 onclick="showListPage()">活動流程表系統</h1>
  <div class="header-actions">
    <span class="save-indicator" id="saveIndicator" style="display:none">自動儲存中</span>
    <button class="btn btn-primary btn-sm" id="btnExportPDF" style="display:none" onclick="openExportModal()">匯出 PDF</button>
  </div>
</div>

<div class="container">
  <!-- ===== List Page ===== -->
  <div class="event-list-page" id="listPage">
    <div class="list-header">
      <h2>所有活動</h2>
      <button class="btn btn-primary" onclick="createNewEvent()">+ 新增活動</button>
    </div>
    <div class="event-cards" id="eventCards"></div>
  </div>

  <!-- ===== Editor Page ===== -->
  <div class="event-editor-page" id="editorPage">
    <div style="margin-bottom:16px;display:flex;gap:8px;align-items:center;">
      <button class="btn btn-secondary btn-sm" onclick="showListPage()">&larr; 返回列表</button>
      <button class="btn btn-secondary btn-sm" id="btnUndo" onclick="undo()" style="margin-left:auto;opacity:0.3;" title="復原上一步 (Ctrl+Z)">&#x21A9; 復原</button>
      <button class="btn btn-secondary btn-sm" id="btnBackups" onclick="openBackupModal()">&#x1f4be; 版本紀錄</button>
      <button class="btn btn-primary btn-sm" onclick="window.open('/v/'+currentEventId,'_blank')">&#x1f517; 線上預覽</button>
    </div>
    <div class="event-info">
      <h2>活動資訊</h2>
      <div class="info-grid">
        <div><label>活動名稱</label><input id="eventName" placeholder="例：2026 春季音樂會" oninput="autoSave()"></div>
        <div><label>日期</label><input id="eventDate" type="date" oninput="autoSave()"></div>
        <div><label>場地</label><input id="eventVenue" placeholder="例：台北國際會議中心" oninput="autoSave()"></div>
        <div><label>主辦單位</label><input id="eventOrganizer" placeholder="例：XX文化公司" oninput="autoSave()"></div>
        <div><label>聯絡人</label><input id="eventContact" placeholder="例：王大明" oninput="autoSave()"></div>
        <div><label>聯絡電話</label><input id="eventPhone" placeholder="例：0912-345-678" oninput="autoSave()"></div>
      </div>
    </div>
    <div class="roles-section">
      <h2>角色組別（可自訂）</h2>
      <div class="roles-list" id="rolesList"></div>
      <div class="add-role-row">
        <input id="newRoleName" placeholder="新增角色名稱" onkeydown="if(event.key==='Enter')addRole()">
        <button class="btn btn-secondary btn-sm" onclick="addRole()">+ 新增</button>
      </div>
    </div>
    <div class="cue-section">
      <h2>流程表</h2>
      <div class="cue-table-wrapper">
        <table class="cue-table" id="cueTable">
          <thead id="cueHead"></thead>
          <tbody id="cueBody"></tbody>
        </table>
      </div>
      <div class="add-row-btn">
        <button class="btn btn-success btn-sm" onclick="addRow()">+ 新增項目</button>
        <button class="btn btn-secondary btn-sm" onclick="addSectionRow()">+ 新增段落分隔</button>
      </div>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h3>匯出 PDF</h3>
    <p style="font-size:14px;color:#666;margin-bottom:16px;">選擇要顯示的角色欄位：</p>
    <div class="modal-roles" id="modalRoles"></div>
    <div style="margin-bottom:16px;">
      <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer;">
        <input type="checkbox" id="landscapeCheck" style="width:18px;height:18px;accent-color:#4a6cf7;">
        橫向列印
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeExportModal()">取消</button>
      <button class="btn btn-primary" onclick="generatePDF()">產生 PDF</button>
    </div>
  </div>
</div>

<!-- Backup Modal -->
<div class="modal-overlay" id="backupModal">
  <div class="modal" style="width:520px;">
    <h3>&#x1f4be; 版本紀錄</h3>
    <p style="font-size:13px;color:#666;margin-bottom:16px;">每次儲存自動備份，可回復到先前版本</p>
    <div id="backupList" style="max-height:400px;overflow-y:auto;"></div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn btn-secondary" onclick="closeBackupModal()">關閉</button>
    </div>
  </div>
</div>

<script>
// ============ State ============
let currentEventId = null;
let state = null;
let undoStack = [];  // undo history (max 50 snapshots)
const MAX_UNDO = 50;

const ROLE_COLORS = [
  { bg: '#e3f2fd', fg: '#1565c0' }, { bg: '#fff3e0', fg: '#e65100' },
  { bg: '#e8f5e9', fg: '#2e7d32' }, { bg: '#f3e5f5', fg: '#7b1fa2' },
  { bg: '#fce4ec', fg: '#c62828' }, { bg: '#e0f7fa', fg: '#00838f' },
  { bg: '#fff8e1', fg: '#f57f17' }, { bg: '#efebe9', fg: '#4e342e' },
];
const PDF_ROLE_COLORS = [
  [30,136,229],[230,81,0],[46,125,50],[123,31,162],
  [198,40,40],[0,131,143],[245,127,23],[78,52,46],
];

// ============ API ============
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('/api' + path, opts);
  return res.json();
}

// ============ List Page ============
async function loadEventList() {
  const events = await api('GET', '/events');
  const container = document.getElementById('eventCards');
  if (events.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>還沒有任何活動</p><button class="btn btn-primary" onclick="createNewEvent()">建立第一個活動</button></div>';
    return;
  }
  container.innerHTML = events.map(ev => `
    <div class="event-card" onclick="openEvent('${ev.id}')">
      <div class="card-actions">
        <button onclick="event.stopPropagation();duplicateEvent('${ev.id}')" title="複製">&#x2398;</button>
        <button onclick="event.stopPropagation();deleteEvent('${ev.id}','${esc(ev.name)}')" title="刪除">&#x1f5d1;</button>
      </div>
      <h3>${esc(ev.name) || '未命名活動'}</h3>
      <div class="meta">
        ${ev.date ? '<span>日期：' + ev.date + '</span>' : ''}
        ${ev.venue ? '<span>場地：' + esc(ev.venue) + '</span>' : ''}
        <span>更新：${new Date(ev.updatedAt).toLocaleString('zh-TW')}</span>
      </div>
    </div>
  `).join('');
}

async function createNewEvent() {
  const data = await api('POST', '/events', {
    event: { name: '', date: '', venue: '', organizer: '', contact: '', phone: '' },
    roles: ['場控', '音控', '燈控', '視訊'],
    rows: Array.from({ length: 5 }, () => ({ time: '', duration: '', item: '', notes: { '場控': '', '音控': '', '燈控': '', '視訊': '' }, isSection: false, sectionLabel: '' }))
  });
  openEvent(data.id);
}

async function deleteEvent(id, name) {
  if (!confirm(`確定要刪除「${name || '未命名活動'}」嗎？`)) return;
  await api('DELETE', '/events/' + id);
  loadEventList();
}

async function duplicateEvent(id) {
  await api('POST', '/events/' + id + '/duplicate');
  loadEventList();
}

function showListPage() {
  currentEventId = null;
  state = null;
  document.getElementById('listPage').style.display = 'block';
  document.getElementById('editorPage').style.display = 'none';
  document.getElementById('saveIndicator').style.display = 'none';
  document.getElementById('btnExportPDF').style.display = 'none';
  history.pushState({}, '', '/');
  loadEventList();
}

// ============ Data Normalization ============
function normalizeState() {
  if (!state) return;
  if (!state.roles) state.roles = [];
  if (!state.rows) state.rows = [];
  state.rows.forEach(row => {
    if (!row.notes) row.notes = {};
    if (!row.isSection) {
      // Ensure all roles have entries in notes
      state.roles.forEach(role => {
        if (!(role in row.notes)) row.notes[role] = '';
      });
    }
  });
}

// ============ Editor Page ============
async function openEvent(id) {
  currentEventId = id;
  state = await api('GET', '/events/' + id);
  normalizeState();
  undoStack = [];
  updateUndoBtn();
  document.getElementById('listPage').style.display = 'none';
  document.getElementById('editorPage').style.display = 'block';
  document.getElementById('saveIndicator').style.display = 'inline';
  document.getElementById('btnExportPDF').style.display = 'inline-block';
  history.pushState({}, '', '/?id=' + id);
  syncEventFields();
  renderRoles();
  renderTable();
}

function readEventFields() {
  state.event.name = document.getElementById('eventName').value;
  state.event.date = document.getElementById('eventDate').value;
  state.event.venue = document.getElementById('eventVenue').value;
  state.event.organizer = document.getElementById('eventOrganizer').value;
  state.event.contact = document.getElementById('eventContact').value;
  state.event.phone = document.getElementById('eventPhone').value;
}

function syncEventFields() {
  document.getElementById('eventName').value = state.event.name || '';
  document.getElementById('eventDate').value = state.event.date || '';
  document.getElementById('eventVenue').value = state.event.venue || '';
  document.getElementById('eventOrganizer').value = state.event.organizer || '';
  document.getElementById('eventContact').value = state.event.contact || '';
  document.getElementById('eventPhone').value = state.event.phone || '';
}

// ============ Auto Save to Server ============
let saveTimer;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToServer, 800);
}

function pushUndo() {
  undoStack.push(JSON.stringify(state));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  updateUndoBtn();
}

function updateUndoBtn() {
  const btn = document.getElementById('btnUndo');
  if (btn) btn.style.opacity = undoStack.length > 0 ? '1' : '0.3';
}

async function saveToServer() {
  if (!currentEventId || !state) return;
  readEventFields();
  pushUndo();
  await api('PUT', '/events/' + currentEventId, state);
  const ind = document.getElementById('saveIndicator');
  ind.textContent = '已儲存';
  ind.classList.add('saved');
  setTimeout(() => { ind.textContent = '自動儲存中'; ind.classList.remove('saved'); }, 1500);
}

// ============ Roles ============
function renderRoles() {
  const list = document.getElementById('rolesList');
  list.innerHTML = '';
  state.roles.forEach((role, i) => {
    const tag = document.createElement('span');
    tag.className = `role-tag role-color-${i % ROLE_COLORS.length}`;
    tag.innerHTML = `${esc(role)} <span class="remove-role" onclick="removeRole(${i})">&times;</span>`;
    list.appendChild(tag);
  });
}

function addRole() {
  const input = document.getElementById('newRoleName');
  const name = input.value.trim();
  if (!name || state.roles.includes(name)) return;
  state.roles.push(name);
  state.rows.forEach(r => {
    if (!r.notes) r.notes = {};
    if (!r.isSection) r.notes[name] = '';
  });
  input.value = '';
  renderRoles();
  renderTable();
  autoSave();
}

function removeRole(idx) {
  const name = state.roles[idx];
  state.roles.splice(idx, 1);
  state.rows.forEach(r => { if (r.notes) delete r.notes[name]; });
  renderRoles();
  renderTable();
  autoSave();
}

// ============ Table ============
function renderTable() { renderHead(); renderBody(); }

function renderHead() {
  const head = document.getElementById('cueHead');
  let html = '<tr><th class="col-num">#</th><th class="col-time">時間</th><th class="col-duration">時長</th><th class="col-item">項目</th>';
  state.roles.forEach((role, i) => {
    html += `<th class="col-note" style="color:${ROLE_COLORS[i % ROLE_COLORS.length].fg}">${esc(role)}</th>`;
  });
  html += '<th class="col-actions">操作</th></tr>';
  head.innerHTML = html;
}

function renderBody() {
  const body = document.getElementById('cueBody');
  let html = '';
  let num = 1;
  state.rows.forEach((row, i) => {
    if (row.isSection) {
      const colspan = 4 + state.roles.length + 1;
      html += `<tr draggable="true" data-idx="${i}" ondragstart="onDragStart(event,${i})" ondragover="onDragOver(event)" ondragenter="onDragEnter(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,${i})" ondragend="onDragEnd(event)" style="background:#f0f2f5;">`;
      html += `<td colspan="${colspan}" style="padding:8px 12px;font-weight:700;font-size:14px;color:#1a1a2e;">`;
      html += `<span class="drag-handle" title="拖曳排序">&#x2630;</span> `;
      html += `<input value="${esc(row.sectionLabel)}" placeholder="段落名稱（例：彩排、正式演出）" style="font-weight:700;font-size:14px;color:#1a1a2e;width:calc(100% - 100px);" oninput="state.rows[${i}].sectionLabel=this.value;autoSave()">`;
      html += `<span style="float:right;">`;
      html += `<button class="insert-btn" onclick="insertRow(${i})" title="在下方插入">&#x2795;</button>`;
      html += `<button style="background:none;border:none;cursor:pointer;opacity:0.4;font-size:16px;" onclick="deleteRow(${i})">&#x1f5d1;</button>`;
      html += `</span></td></tr>`;
    } else {
      html += `<tr draggable="true" data-idx="${i}" ondragstart="onDragStart(event,${i})" ondragover="onDragOver(event)" ondragenter="onDragEnter(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,${i})" ondragend="onDragEnd(event)">`;
      html += `<td class="col-num" style="color:#aaa;font-size:12px;"><span class="drag-handle" title="拖曳排序">&#x2630;</span> ${num++}</td>`;
      html += `<td><input value="${esc(row.time)}" placeholder="時間" oninput="state.rows[${i}].time=this.value;autoSave()"></td>`;
      html += `<td><input value="${esc(row.duration)}" placeholder="分鐘" oninput="state.rows[${i}].duration=this.value;autoSave()"></td>`;
      html += `<td><textarea placeholder="項目名稱" oninput="state.rows[${i}].item=this.value;autoSave()">${esc(row.item)}</textarea></td>`;
      state.roles.forEach(role => {
        const val = (row.notes && row.notes[role]) || '';
        const ri = state.roles.indexOf(role);
        html += `<td><textarea placeholder="${esc(role)}備註" oninput="state.rows[${i}].notes[state.roles[${ri}]]=this.value;autoSave()">${esc(val)}</textarea></td>`;
      });
      html += `<td class="row-actions">`;
      html += `<button class="insert-btn" onclick="insertRow(${i})" title="在下方插入">&#x2795;</button>`;
      html += `<button onclick="deleteRow(${i})" title="刪除">&#x1f5d1;</button>`;
      html += `</td></tr>`;
    }
  });
  body.innerHTML = html;
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function createEmptyRow(isSection = false) {
  const notes = {};
  state.roles.forEach(r => notes[r] = '');
  return { time: '', duration: '', item: '', notes, isSection, sectionLabel: '' };
}

function addRow() { state.rows.push(createEmptyRow()); renderBody(); autoSave(); }
function addSectionRow() { state.rows.push(createEmptyRow(true)); renderBody(); autoSave(); }
function insertRow(afterIdx) {
  state.rows.splice(afterIdx + 1, 0, createEmptyRow());
  renderBody();
  autoSave();
}
function deleteRow(idx) { state.rows.splice(idx, 1); renderBody(); autoSave(); }

// ============ Drag & Drop ============
let dragIdx = null;

function onDragStart(e, idx) {
  dragIdx = idx;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', idx);
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function onDragEnter(e) {
  e.preventDefault();
  const tr = e.currentTarget.closest ? e.currentTarget : e.target.closest('tr');
  if (tr) tr.classList.add('drag-over');
}

function onDragLeave(e) {
  const tr = e.currentTarget.closest ? e.currentTarget : e.target.closest('tr');
  if (tr) tr.classList.remove('drag-over');
}

function onDrop(e, dropIdx) {
  e.preventDefault();
  const tr = e.currentTarget.closest ? e.currentTarget : e.target.closest('tr');
  if (tr) tr.classList.remove('drag-over');
  if (dragIdx === null || dragIdx === dropIdx) return;
  const [moved] = state.rows.splice(dragIdx, 1);
  state.rows.splice(dropIdx, 0, moved);
  dragIdx = null;
  renderBody();
  autoSave();
}

function onDragEnd(e) {
  dragIdx = null;
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}

// ============ PDF Export ============
function openExportModal() {
  const container = document.getElementById('modalRoles');
  container.innerHTML = '';
  let lbl = document.createElement('label');
  lbl.innerHTML = `<input type="checkbox" value="__all__" checked onchange="toggleAllRoles(this)"> <strong>全部角色</strong>`;
  container.appendChild(lbl);
  state.roles.forEach((role, i) => {
    lbl = document.createElement('label');
    const c = ROLE_COLORS[i % ROLE_COLORS.length];
    lbl.innerHTML = `<input type="checkbox" value="${esc(role)}" checked class="role-check">
      <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${c.fg};"></span> ${esc(role)}`;
    container.appendChild(lbl);
  });
  document.getElementById('exportModal').classList.add('active');
}
function closeExportModal() { document.getElementById('exportModal').classList.remove('active'); }
function toggleAllRoles(cb) { document.querySelectorAll('.role-check').forEach(c => c.checked = cb.checked); }

async function generatePDF() {
  readEventFields();
  const { jsPDF } = window.jspdf;
  const isLandscape = document.getElementById('landscapeCheck').checked;
  const doc = new jsPDF({ orientation: isLandscape ? 'landscape' : 'portrait', unit: 'mm', format: 'a4' });
  await loadChineseFont(doc);

  const selectedRoles = [];
  document.querySelectorAll('.role-check:checked').forEach(cb => selectedRoles.push(cb.value));
  if (selectedRoles.length === 0) { alert('請至少選擇一個角色'); return; }

  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();

  doc.setFont('NotoSansTC', 'normal');
  doc.setFontSize(14);
  doc.text(state.event.name || '活動流程表', pageW / 2, 12, { align: 'center' });

  if (selectedRoles.length < state.roles.length) {
    doc.setFontSize(9); doc.setTextColor(100);
    doc.text(`${selectedRoles.join(' / ')} 版本`, pageW / 2, 18, { align: 'center' });
    doc.setTextColor(0);
  }

  let infoY = selectedRoles.length < state.roles.length ? 22 : 17;
  doc.setFontSize(8); doc.setTextColor(80);
  const parts = [];
  if (state.event.date) parts.push(`日期：${state.event.date}`);
  if (state.event.venue) parts.push(`場地：${state.event.venue}`);
  if (state.event.organizer) parts.push(`主辦：${state.event.organizer}`);
  if (state.event.contact) parts.push(`聯絡人：${state.event.contact}`);
  if (state.event.phone) parts.push(`電話：${state.event.phone}`);
  if (parts.length) { doc.text(parts.join('   '), pageW / 2, infoY, { align: 'center' }); infoY += 4; }
  doc.setTextColor(0);

  const headers = ['#', '時間', '時長', '項目', ...selectedRoles];
  const bodyData = [];
  let num = 1;
  state.rows.forEach(row => {
    if (row.isSection) {
      bodyData.push([{ content: row.sectionLabel || '---', colSpan: headers.length, styles: { fontStyle: 'bold', fillColor: [230,232,238], textColor: [26,26,46], fontSize: 8, cellPadding: 1.5, font: 'NotoSansTC' } }]);
    } else {
      const r = [num++, row.time || '', row.duration || '', row.item || ''];
      selectedRoles.forEach(role => r.push((row.notes && row.notes[role]) || ''));
      bodyData.push(r);
    }
  });

  const headerStyles = {};
  selectedRoles.forEach((role, i) => {
    const gi = state.roles.indexOf(role);
    headerStyles[4 + i] = { fillColor: PDF_ROLE_COLORS[gi % PDF_ROLE_COLORS.length], textColor: [255,255,255] };
  });

  // Dynamic column width calculation
  const margin = 10; // tighter margins for more space
  const tableW = pageW - margin * 2;
  const roleCount = selectedRoles.length;

  // Fixed columns: #=6, time=14, duration=10
  const numW = 6, timeW = 14, durW = 10;
  const fixedW = numW + timeW + durW;

  // Item column: give it proportional space but not too much
  const remainForContent = tableW - fixedW;
  const itemW = Math.max(24, Math.min(40, remainForContent * 0.12));

  // Role columns: distribute remaining space, weighted by content length
  const remainForRoles = remainForContent - itemW;
  const roleW = Math.max(18, remainForRoles / roleCount);
  const roleColStyles = {};
  for (let i = 0; i < roleCount; i++) { roleColStyles[4 + i] = { cellWidth: roleW }; }

  // Adaptive font size: shrink when many columns
  const baseFontSize = roleCount >= 7 ? 6.5 : roleCount >= 5 ? 7 : 7.5;
  const headerFontSize = baseFontSize + 0.5;

  // Max row height: prevent single rows from spanning pages
  // For landscape A4: usable height ~190mm, allow max ~45mm per row (about 4 rows/page)
  const maxRowH = isLandscape ? 45 : 55;

  doc.autoTable({
    startY: infoY, head: [headers], body: bodyData, margin: { left: margin, right: margin, top: 8, bottom: 12 },
    styles: { font: 'NotoSansTC', fontSize: baseFontSize, cellPadding: 1.5, lineWidth: 0.1, lineColor: [200,200,200], overflow: 'linebreak', valign: 'top' },
    headStyles: { fillColor: [26,26,46], textColor: [255,255,255], fontSize: headerFontSize, fontStyle: 'bold', font: 'NotoSansTC', cellPadding: 1.5 },
    columnStyles: { 0: { cellWidth: numW, halign: 'center' }, 1: { cellWidth: timeW }, 2: { cellWidth: durW, halign: 'center' }, 3: { cellWidth: itemW }, ...roleColStyles },
    didParseCell: function(data) {
      if (data.section === 'head' && headerStyles[data.column.index]) Object.assign(data.cell.styles, headerStyles[data.column.index]);
      // Clamp row height: truncate overflowing text with ellipsis indicator
      if (data.section === 'body' && data.cell.text && Array.isArray(data.cell.text)) {
        // Estimate: each line ~baseFontSize * 0.35mm height + padding
        const lineH = baseFontSize * 0.45;
        const maxLines = Math.floor((maxRowH - 3) / lineH);
        if (data.cell.text.length > maxLines) {
          data.cell.text = data.cell.text.slice(0, maxLines);
          data.cell.text[maxLines - 1] = (data.cell.text[maxLines - 1] || '') + '...';
        }
      }
    },
    didDrawPage: function() {
      doc.setFontSize(7); doc.setTextColor(150); doc.setFont('NotoSansTC', 'normal');
      doc.text(`${state.event.name || '活動流程表'} - 第 ${doc.internal.getCurrentPageInfo().pageNumber} 頁`, pageW / 2, pageH - 6, { align: 'center' });
    }
  });

  const suffix = selectedRoles.length < state.roles.length ? `_${selectedRoles.join('_')}` : '';
  doc.save(`${state.event.name || '活動流程表'}${suffix}.pdf`);
  closeExportModal();
}

let _fontBase64Cache = null;
async function loadChineseFont(doc) {
  if (!_fontBase64Cache) {
    try {
      const resp = await fetch('/fonts/NotoSansTC-Regular.ttf');
      if (!resp.ok) throw new Error('Font fetch failed');
      const buf = await resp.arrayBuffer();
      const bytes = new Uint8Array(buf);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      _fontBase64Cache = btoa(binary);
    } catch(e) { console.error('Font load error:', e); return; }
  }
  doc.addFileToVFS('NotoSansTC-Regular.ttf', _fontBase64Cache);
  doc.addFont('NotoSansTC-Regular.ttf', 'NotoSansTC', 'normal');
  doc.setFont('NotoSansTC', 'normal');
}

// ============ Undo ============
async function undo() {
  if (undoStack.length === 0) return;
  const prev = JSON.parse(undoStack.pop());
  state = prev;
  normalizeState();
  syncEventFields();
  renderRoles();
  renderTable();
  updateUndoBtn();
  // Save the restored state to server (without pushing to undo)
  await api('PUT', '/events/' + currentEventId, state);
  const ind = document.getElementById('saveIndicator');
  ind.textContent = '已復原';
  ind.classList.add('saved');
  setTimeout(() => { ind.textContent = '自動儲存中'; ind.classList.remove('saved'); }, 1500);
}

// Ctrl+Z / Cmd+Z shortcut for undo
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    // Only intercept if not focused on an input/textarea
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return; // let browser handle native undo
    e.preventDefault();
    undo();
  }
});

// ============ Backup / Restore ============
function openBackupModal() {
  document.getElementById('backupModal').classList.add('active');
  loadBackups();
}
function closeBackupModal() { document.getElementById('backupModal').classList.remove('active'); }

async function loadBackups() {
  const container = document.getElementById('backupList');
  container.innerHTML = '<p style="color:#aaa;text-align:center;">載入中...</p>';
  const backups = await api('GET', '/events/' + currentEventId + '/backups');
  if (backups.length === 0) {
    container.innerHTML = '<p style="color:#aaa;text-align:center;">目前沒有備份紀錄</p>';
    return;
  }
  container.innerHTML = backups.map((b, i) => {
    const date = new Date(b.createdAt);
    const timeStr = date.toLocaleString('zh-TW');
    const sizeKB = (b.size / 1024).toFixed(1);
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid #f0f0f0;${i===0?'background:#f7f8fc;':''}">
      <div>
        <div style="font-size:13px;font-weight:500;">${timeStr}</div>
        <div style="font-size:11px;color:#aaa;">${sizeKB} KB</div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="restoreBackup('${esc(b.filename)}')">回復</button>
    </div>`;
  }).join('');
}

async function restoreBackup(filename) {
  if (!confirm('確定要回復到這個版本嗎？目前的版本會自動備份。')) return;
  const result = await api('POST', '/events/' + currentEventId + '/restore/' + filename);
  if (result.ok && result.data) {
    state = result.data;
    normalizeState();
    syncEventFields();
    renderRoles();
    renderTable();
    closeBackupModal();
    const ind = document.getElementById('saveIndicator');
    ind.textContent = '已回復';
    ind.classList.add('saved');
    setTimeout(() => { ind.textContent = '自動儲存中'; ind.classList.remove('saved'); }, 2000);
  }
}

// ============ Init ============
window.addEventListener('popstate', () => {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (id) openEvent(id); else showListPage();
});

(function init() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (id) openEvent(id); else loadEventList();
})();
</script>
