<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動流程表</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f0f2f5; color: #333; }

.header {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: #fff;
  padding: 20px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 { font-size: 22px; font-weight: 600; }
.header-actions { display: flex; gap: 10px; }

.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* Event Info */
.event-info {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.event-info h2 { font-size: 16px; margin-bottom: 16px; color: #1a1a2e; }
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.info-grid label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
.info-grid input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  transition: border-color 0.2s;
}
.info-grid input:focus { outline: none; border-color: #4a6cf7; }

/* Roles config */
.roles-section {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.roles-section h2 { font-size: 16px; margin-bottom: 16px; color: #1a1a2e; }
.roles-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.role-tag {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  cursor: default;
}
.role-tag .remove-role {
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  opacity: 0.6;
  transition: opacity 0.2s;
}
.role-tag .remove-role:hover { opacity: 1; }
.add-role-row { display: flex; gap: 8px; }
.add-role-row input {
  padding: 6px 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 13px;
  width: 160px;
}
.add-role-row input:focus { outline: none; border-color: #4a6cf7; }

/* Table */
.cue-section {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.cue-section h2 { font-size: 16px; margin-bottom: 16px; color: #1a1a2e; }

.cue-table-wrapper { overflow-x: auto; }
table.cue-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 800px;
}
.cue-table th {
  background: #f7f8fc;
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  color: #555;
  border-bottom: 2px solid #e8e8e8;
  white-space: nowrap;
}
.cue-table td {
  padding: 6px 8px;
  border-bottom: 1px solid #f0f0f0;
  vertical-align: top;
}
.cue-table tr:hover { background: #fafbff; }
.cue-table input, .cue-table textarea {
  width: 100%;
  border: 1px solid transparent;
  background: transparent;
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
  transition: border-color 0.2s, background 0.2s;
}
.cue-table input:focus, .cue-table textarea:focus {
  outline: none;
  border-color: #4a6cf7;
  background: #fff;
}
.cue-table input:hover, .cue-table textarea:hover {
  background: #f7f8fc;
}
.cue-table textarea { min-height: 36px; }

td.row-actions {
  white-space: nowrap;
  text-align: center;
}
.row-actions button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  opacity: 0.4;
  transition: opacity 0.2s;
}
.row-actions button:hover { opacity: 1; }

.col-num { width: 40px; text-align: center; }
.col-time { width: 90px; }
.col-duration { width: 70px; }
.col-item { width: 180px; }
.col-note { min-width: 120px; }
.col-actions { width: 70px; }

/* Buttons */
.btn {
  padding: 8px 18px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.btn-primary { background: #4a6cf7; color: #fff; }
.btn-primary:hover { background: #3b5de7; }
.btn-secondary { background: #e8ecf4; color: #333; }
.btn-secondary:hover { background: #dde1ea; }
.btn-danger { background: #ff4757; color: #fff; }
.btn-danger:hover { background: #e83d4d; }
.btn-success { background: #2ed573; color: #fff; }
.btn-success:hover { background: #26c066; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.add-row-btn {
  margin-top: 12px;
  display: flex;
  gap: 8px;
}

/* PDF Export Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #fff;
  border-radius: 16px;
  padding: 32px;
  width: 420px;
  max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal h3 { font-size: 18px; margin-bottom: 20px; color: #1a1a2e; }
.modal-roles { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.modal-roles label {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 8px;
  transition: background 0.2s;
}
.modal-roles label:hover { background: #f7f8fc; }
.modal-roles input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #4a6cf7;
}
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* Role colors */
.role-color-0 { background: #e3f2fd; color: #1565c0; }
.role-color-1 { background: #fff3e0; color: #e65100; }
.role-color-2 { background: #e8f5e9; color: #2e7d32; }
.role-color-3 { background: #f3e5f5; color: #7b1fa2; }
.role-color-4 { background: #fce4ec; color: #c62828; }
.role-color-5 { background: #e0f7fa; color: #00838f; }
.role-color-6 { background: #fff8e1; color: #f57f17; }
.role-color-7 { background: #efebe9; color: #4e342e; }

/* Save indicator */
.save-indicator {
  font-size: 12px;
  color: #aaa;
  transition: color 0.3s;
}
.save-indicator.saved { color: #2ed573; }
</style>
</head>
<body>

<div class="header">
  <h1>活動流程表系統</h1>
  <div class="header-actions">
    <span class="save-indicator" id="saveIndicator">自動儲存中</span>
    <button class="btn btn-secondary btn-sm" onclick="exportJSON()">匯出 JSON</button>
    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('importInput').click()">匯入 JSON</button>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="importJSON(event)">
    <button class="btn btn-primary btn-sm" onclick="openExportModal()">匯出 PDF</button>
  </div>
</div>

<div class="container">
  <!-- Event Info -->
  <div class="event-info">
    <h2>活動資訊</h2>
    <div class="info-grid">
      <div><label>活動名稱</label><input id="eventName" placeholder="例：2026 春季音樂會" oninput="autoSave()"></div>
      <div><label>日期</label><input id="eventDate" type="date" oninput="autoSave()"></div>
      <div><label>場地</label><input id="eventVenue" placeholder="例：台北國際會議中心" oninput="autoSave()"></div>
      <div><label>主辦單位</label><input id="eventOrganizer" placeholder="例：XX文化公司" oninput="autoSave()"></div>
      <div><label>聯絡人</label><input id="eventContact" placeholder="例：王大明" oninput="autoSave()"></div>
      <div><label>聯絡電話</label><input id="eventPhone" placeholder="例：0912-345-678" oninput="autoSave()"></div>
    </div>
  </div>

  <!-- Roles -->
  <div class="roles-section">
    <h2>角色組別（可自訂）</h2>
    <div class="roles-list" id="rolesList"></div>
    <div class="add-role-row">
      <input id="newRoleName" placeholder="新增角色名稱" onkeydown="if(event.key==='Enter')addRole()">
      <button class="btn btn-secondary btn-sm" onclick="addRole()">+ 新增</button>
    </div>
  </div>

  <!-- Cue Table -->
  <div class="cue-section">
    <h2>流程表</h2>
    <div class="cue-table-wrapper">
      <table class="cue-table" id="cueTable">
        <thead id="cueHead"></thead>
        <tbody id="cueBody"></tbody>
      </table>
    </div>
    <div class="add-row-btn">
      <button class="btn btn-success btn-sm" onclick="addRow()">+ 新增項目</button>
      <button class="btn btn-secondary btn-sm" onclick="addSectionRow()">+ 新增段落分隔</button>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h3>匯出 PDF</h3>
    <p style="font-size:14px;color:#666;margin-bottom:16px;">選擇要顯示的角色欄位：</p>
    <div class="modal-roles" id="modalRoles"></div>
    <div style="margin-bottom:16px;">
      <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer;">
        <input type="checkbox" id="landscapeCheck" style="width:18px;height:18px;accent-color:#4a6cf7;">
        橫向列印
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeExportModal()">取消</button>
      <button class="btn btn-primary" onclick="generatePDF()">產生 PDF</button>
    </div>
  </div>
</div>

<script>
// ============ State ============
let state = {
  event: { name: '', date: '', venue: '', organizer: '', contact: '', phone: '' },
  roles: ['場控', '音控', '燈控', '視訊'],
  rows: []
};

const ROLE_COLORS = [
  { bg: '#e3f2fd', fg: '#1565c0' },
  { bg: '#fff3e0', fg: '#e65100' },
  { bg: '#e8f5e9', fg: '#2e7d32' },
  { bg: '#f3e5f5', fg: '#7b1fa2' },
  { bg: '#fce4ec', fg: '#c62828' },
  { bg: '#e0f7fa', fg: '#00838f' },
  { bg: '#fff8e1', fg: '#f57f17' },
  { bg: '#efebe9', fg: '#4e342e' },
];

const PDF_ROLE_COLORS = [
  [30, 136, 229],
  [230, 81, 0],
  [46, 125, 50],
  [123, 31, 162],
  [198, 40, 40],
  [0, 131, 143],
  [245, 127, 23],
  [78, 52, 46],
];

// ============ Init ============
function init() {
  loadState();
  renderRoles();
  renderTable();
  syncEventFields();
}

function loadState() {
  const saved = localStorage.getItem('cuesheet_state');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
    } catch(e) {}
  }
  if (state.rows.length === 0) {
    for (let i = 0; i < 5; i++) {
      state.rows.push(createEmptyRow());
    }
  }
}

function saveState() {
  readEventFields();
  localStorage.setItem('cuesheet_state', JSON.stringify(state));
  const ind = document.getElementById('saveIndicator');
  ind.textContent = '已儲存';
  ind.classList.add('saved');
  setTimeout(() => {
    ind.textContent = '自動儲存中';
    ind.classList.remove('saved');
  }, 1500);
}

let saveTimer;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 500);
}

function createEmptyRow(isSection = false) {
  const notes = {};
  state.roles.forEach(r => notes[r] = '');
  return { time: '', duration: '', item: '', notes, isSection, sectionLabel: '' };
}

// ============ Event Fields ============
function readEventFields() {
  state.event.name = document.getElementById('eventName').value;
  state.event.date = document.getElementById('eventDate').value;
  state.event.venue = document.getElementById('eventVenue').value;
  state.event.organizer = document.getElementById('eventOrganizer').value;
  state.event.contact = document.getElementById('eventContact').value;
  state.event.phone = document.getElementById('eventPhone').value;
}

function syncEventFields() {
  document.getElementById('eventName').value = state.event.name || '';
  document.getElementById('eventDate').value = state.event.date || '';
  document.getElementById('eventVenue').value = state.event.venue || '';
  document.getElementById('eventOrganizer').value = state.event.organizer || '';
  document.getElementById('eventContact').value = state.event.contact || '';
  document.getElementById('eventPhone').value = state.event.phone || '';
}

// ============ Roles ============
function renderRoles() {
  const list = document.getElementById('rolesList');
  list.innerHTML = '';
  state.roles.forEach((role, i) => {
    const colorIdx = i % ROLE_COLORS.length;
    const tag = document.createElement('span');
    tag.className = `role-tag role-color-${colorIdx}`;
    tag.innerHTML = `${role} <span class="remove-role" onclick="removeRole(${i})">&times;</span>`;
    list.appendChild(tag);
  });
}

function addRole() {
  const input = document.getElementById('newRoleName');
  const name = input.value.trim();
  if (!name || state.roles.includes(name)) return;
  state.roles.push(name);
  state.rows.forEach(r => { if (!r.isSection) r.notes[name] = ''; });
  input.value = '';
  renderRoles();
  renderTable();
  autoSave();
}

function removeRole(idx) {
  const name = state.roles[idx];
  state.roles.splice(idx, 1);
  state.rows.forEach(r => delete r.notes[name]);
  renderRoles();
  renderTable();
  autoSave();
}

// ============ Table ============
function renderTable() {
  renderHead();
  renderBody();
}

function renderHead() {
  const head = document.getElementById('cueHead');
  let html = '<tr>';
  html += '<th class="col-num">#</th>';
  html += '<th class="col-time">時間</th>';
  html += '<th class="col-duration">時長</th>';
  html += '<th class="col-item">項目</th>';
  state.roles.forEach((role, i) => {
    const c = ROLE_COLORS[i % ROLE_COLORS.length];
    html += `<th class="col-note" style="color:${c.fg}">${role}</th>`;
  });
  html += '<th class="col-actions">操作</th>';
  html += '</tr>';
  head.innerHTML = html;
}

function renderBody() {
  const body = document.getElementById('cueBody');
  let html = '';
  let num = 1;
  state.rows.forEach((row, i) => {
    if (row.isSection) {
      const colspan = 4 + state.roles.length + 1;
      html += `<tr style="background:#f0f2f5;">`;
      html += `<td colspan="${colspan}" style="padding:8px 12px;font-weight:700;font-size:14px;color:#1a1a2e;">`;
      html += `<input value="${esc(row.sectionLabel)}" placeholder="段落名稱（例：彩排、正式演出）"
                style="font-weight:700;font-size:14px;color:#1a1a2e;width:100%;"
                oninput="state.rows[${i}].sectionLabel=this.value;autoSave()">`;
      html += `<button style="float:right;background:none;border:none;cursor:pointer;opacity:0.4;font-size:16px;"
                onclick="deleteRow(${i})">&#x1f5d1;</button>`;
      html += `</td></tr>`;
    } else {
      html += `<tr>`;
      html += `<td class="col-num" style="color:#aaa;font-size:12px;">${num++}</td>`;
      html += `<td><input type="time" value="${esc(row.time)}" oninput="state.rows[${i}].time=this.value;autoSave()"></td>`;
      html += `<td><input value="${esc(row.duration)}" placeholder="分鐘" oninput="state.rows[${i}].duration=this.value;autoSave()"></td>`;
      html += `<td><input value="${esc(row.item)}" placeholder="項目名稱" oninput="state.rows[${i}].item=this.value;autoSave()"></td>`;
      state.roles.forEach(role => {
        const val = (row.notes && row.notes[role]) || '';
        html += `<td><textarea placeholder="${role}備註" oninput="state.rows[${i}].notes['${esc(role)}']=this.value;autoSave()">${esc(val)}</textarea></td>`;
      });
      html += `<td class="row-actions">`;
      html += `<button onclick="moveRow(${i},-1)" title="上移">&#x25B2;</button>`;
      html += `<button onclick="moveRow(${i},1)" title="下移">&#x25BC;</button>`;
      html += `<button onclick="deleteRow(${i})" title="刪除">&#x1f5d1;</button>`;
      html += `</td></tr>`;
    }
  });
  body.innerHTML = html;
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addRow() {
  state.rows.push(createEmptyRow());
  renderBody();
  autoSave();
}

function addSectionRow() {
  state.rows.push(createEmptyRow(true));
  renderBody();
  autoSave();
}

function deleteRow(idx) {
  state.rows.splice(idx, 1);
  renderBody();
  autoSave();
}

function moveRow(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= state.rows.length) return;
  [state.rows[idx], state.rows[newIdx]] = [state.rows[newIdx], state.rows[idx]];
  renderBody();
  autoSave();
}

// ============ Export Modal ============
function openExportModal() {
  const container = document.getElementById('modalRoles');
  container.innerHTML = '';
  // "All" option
  let lbl = document.createElement('label');
  lbl.innerHTML = `<input type="checkbox" value="__all__" checked onchange="toggleAllRoles(this)"> <strong>全部角色</strong>`;
  container.appendChild(lbl);
  state.roles.forEach((role, i) => {
    lbl = document.createElement('label');
    const c = ROLE_COLORS[i % ROLE_COLORS.length];
    lbl.innerHTML = `<input type="checkbox" value="${esc(role)}" checked class="role-check">
      <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${c.fg};"></span> ${role}`;
    container.appendChild(lbl);
  });
  document.getElementById('exportModal').classList.add('active');
}

function closeExportModal() {
  document.getElementById('exportModal').classList.remove('active');
}

function toggleAllRoles(cb) {
  document.querySelectorAll('.role-check').forEach(c => c.checked = cb.checked);
}

// ============ PDF Generation ============
async function generatePDF() {
  readEventFields();
  const { jsPDF } = window.jspdf;

  const isLandscape = document.getElementById('landscapeCheck').checked;
  const doc = new jsPDF({ orientation: isLandscape ? 'landscape' : 'portrait', unit: 'mm', format: 'a4' });

  // Load font for Chinese support
  // We'll use the built-in font and handle Chinese via a workaround
  // Actually jsPDF doesn't support CJK natively, so we load a font
  await loadChineseFont(doc);

  const selectedRoles = [];
  document.querySelectorAll('.role-check:checked').forEach(cb => selectedRoles.push(cb.value));
  if (selectedRoles.length === 0) {
    alert('請至少選擇一個角色');
    return;
  }

  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 14;

  // Title
  doc.setFont('NotoSansTC', 'normal');
  doc.setFontSize(18);
  doc.text(state.event.name || '活動流程表', pageW / 2, 18, { align: 'center' });

  // Subtitle: role filter hint
  if (selectedRoles.length < state.roles.length) {
    doc.setFontSize(11);
    doc.setTextColor(100);
    doc.text(`${selectedRoles.join(' / ')} 版本`, pageW / 2, 25, { align: 'center' });
    doc.setTextColor(0);
  }

  // Event info
  let infoY = selectedRoles.length < state.roles.length ? 30 : 25;
  doc.setFontSize(9);
  doc.setTextColor(80);
  const infoParts = [];
  if (state.event.date) infoParts.push(`日期：${state.event.date}`);
  if (state.event.venue) infoParts.push(`場地：${state.event.venue}`);
  if (state.event.organizer) infoParts.push(`主辦：${state.event.organizer}`);
  if (state.event.contact) infoParts.push(`聯絡人：${state.event.contact}`);
  if (state.event.phone) infoParts.push(`電話：${state.event.phone}`);
  if (infoParts.length > 0) {
    doc.text(infoParts.join('    '), pageW / 2, infoY, { align: 'center' });
    infoY += 6;
  }
  doc.setTextColor(0);

  // Build table data
  const headers = ['#', '時間', '時長', '項目'];
  selectedRoles.forEach(r => headers.push(r));

  const bodyData = [];
  let num = 1;
  state.rows.forEach(row => {
    if (row.isSection) {
      const sectionRow = [{ content: row.sectionLabel || '---', colSpan: headers.length, styles: { fontStyle: 'bold', fillColor: [230, 232, 238], textColor: [26, 26, 46], fontSize: 10, font: 'NotoSansTC' } }];
      bodyData.push(sectionRow);
    } else {
      const r = [num++, row.time || '', row.duration ? `${row.duration}min` : '', row.item || ''];
      selectedRoles.forEach(role => r.push((row.notes && row.notes[role]) || ''));
      bodyData.push(r);
    }
  });

  // Column styles
  const colStyles = {
    0: { cellWidth: 8, halign: 'center' },
    1: { cellWidth: 18 },
    2: { cellWidth: 14 },
    3: { cellWidth: 30 },
  };

  // Header styles per role column
  const headerStyles = {};
  selectedRoles.forEach((role, i) => {
    const globalIdx = state.roles.indexOf(role);
    const c = PDF_ROLE_COLORS[globalIdx % PDF_ROLE_COLORS.length];
    headerStyles[4 + i] = { fillColor: c, textColor: [255, 255, 255] };
  });

  doc.autoTable({
    startY: infoY,
    head: [headers],
    body: bodyData,
    margin: { left: margin, right: margin },
    styles: {
      font: 'NotoSansTC',
      fontSize: 8.5,
      cellPadding: 3,
      lineWidth: 0.1,
      lineColor: [200, 200, 200],
      overflow: 'linebreak',
    },
    headStyles: {
      fillColor: [26, 26, 46],
      textColor: [255, 255, 255],
      fontSize: 9,
      fontStyle: 'bold',
      font: 'NotoSansTC',
    },
    columnStyles: colStyles,
    didParseCell: function(data) {
      if (data.section === 'head' && headerStyles[data.column.index]) {
        Object.assign(data.cell.styles, headerStyles[data.column.index]);
      }
    },
    didDrawPage: function(data) {
      // Footer
      doc.setFontSize(8);
      doc.setTextColor(150);
      doc.setFont('NotoSansTC', 'normal');
      const pageNum = doc.internal.getCurrentPageInfo().pageNumber;
      doc.text(`${state.event.name || '活動流程表'} - 第 ${pageNum} 頁`, pageW / 2, pageH - 8, { align: 'center' });
    }
  });

  // Save
  const roleSuffix = selectedRoles.length < state.roles.length ? `_${selectedRoles.join('_')}` : '';
  const fileName = `${state.event.name || '活動流程表'}${roleSuffix}.pdf`;
  doc.save(fileName);
  closeExportModal();
}

// Chinese font loader - uses Noto Sans TC from Google Fonts
async function loadChineseFont(doc) {
  const FONT_KEY = 'cuesheet_font_noto';
  let fontBase64 = localStorage.getItem(FONT_KEY);

  if (!fontBase64) {
    try {
      const resp = await fetch('https://cdn.jsdelivr.net/gh/nicholasgasior/gfonts-base64/fonts/noto-sans-tc/NotoSansTC-Regular-base64.txt');
      if (resp.ok) {
        fontBase64 = await resp.text();
        try { localStorage.setItem(FONT_KEY, fontBase64); } catch(e) {}
      }
    } catch(e) {}
  }

  if (!fontBase64) {
    // Fallback: try another source
    try {
      const resp = await fetch('https://raw.githubusercontent.com/nicholasgasior/gfonts-base64/master/fonts/noto-sans-tc/NotoSansTC-Regular-base64.txt');
      if (resp.ok) {
        fontBase64 = await resp.text();
        try { localStorage.setItem(FONT_KEY, fontBase64); } catch(e) {}
      }
    } catch(e) {}
  }

  if (fontBase64) {
    // Remove data URL prefix if present
    const base64Data = fontBase64.replace(/^data:[^;]+;base64,/, '');
    doc.addFileToVFS('NotoSansTC-Regular.ttf', base64Data);
    doc.addFont('NotoSansTC-Regular.ttf', 'NotoSansTC', 'normal');
    doc.setFont('NotoSansTC', 'normal');
  }
}

// ============ JSON Import/Export ============
function exportJSON() {
  readEventFields();
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${state.event.name || '活動流程表'}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      state = { ...state, ...imported };
      syncEventFields();
      renderRoles();
      renderTable();
      saveState();
    } catch(err) {
      alert('JSON 檔案格式錯誤');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ============ Start ============
init();
</script>
